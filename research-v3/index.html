<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Machine — Shaurya Gupta Research Terminal</title>
<meta name="description" content="A room, a CRT, a research program. Power the machine on and zoom into the terminal.">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* RESEARCH V3 — "THE MACHINE". Original build in the boot→room→CRT-zoom→OS
   experience pattern. Design locked; CONTENT SLOTS editable. */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; height: 100vh; font-family: 'IBM Plex Mono', monospace; }
#gl { position: fixed; inset: 0; }

/* boot dialog (our text, our style) */
#gate { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; background: #000; }
#gate .box { border: 3px solid #fff; padding: 6px; }
#gate .inner { border: 1.5px solid #fff; padding: 26px 34px; color: #fff; font-size: 15px; line-height: 1.9; }
#gate .inner b { letter-spacing: .04em; }
#gate button { display: block; margin: 18px auto 0; border: 2px solid #fff; background: #000; color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 600; letter-spacing: .1em; padding: 9px 26px; cursor: pointer; }
#gate button:hover { background: #fff; color: #000; }

/* hint + back */
#hint { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 40;
  color: #b9a6f5; font-size: 12px; letter-spacing: .16em; text-transform: uppercase; opacity: 0; transition: opacity .8s; }
#hint.show { opacity: .85; }
#back { position: fixed; top: 22px; left: 22px; z-index: 55; border: 1.5px solid #b9a6f5; color: #b9a6f5;
  background: rgba(0,0,0,.5); font-family: inherit; font-size: 12px; letter-spacing: .1em; padding: 8px 14px;
  cursor: pointer; display: none; }
#back:hover { background: #b9a6f5; color: #000; }

/* the OS, revealed inside the monitor after the zoom */
#os-shell { position: fixed; inset: 0; z-index: 50; display: none; }
#os-shell.on { display: block; }
#os-shell .bezel { position: absolute; inset: 0; pointer-events: none; z-index: 52;
  box-shadow: inset 0 0 0 14px #17112b, inset 0 0 0 16px #3a2d5e, inset 0 0 120px rgba(0,0,0,.75);
  border-radius: 18px; }
#os-frame { position: absolute; inset: 14px; width: calc(100% - 28px); height: calc(100% - 28px); border: 0; border-radius: 8px; background: #000; }
#os-shell .glass { position: absolute; inset: 14px; pointer-events: none; z-index: 51; border-radius: 8px;
  background: radial-gradient(ellipse 90% 60% at 50% 8%, rgba(255,255,255,.05), transparent 55%); }

#fade { position: fixed; inset: 0; background: #000; z-index: 58; pointer-events: none; opacity: 0; transition: opacity .45s; }
</style>
</head>
<body>

<canvas id="gl"></canvas>

<!-- CONTENT SLOT: gate copy -->
<div id="gate">
  <div class="box"><div class="inner">
    <b>SHAURYA GUPTA — RESEARCH TERMINAL</b><br>
    One accepted paper. A public failure log. A machine that keeps the record.<br>
    <span style="opacity:.65">Click start; the monitor does the rest.</span>
    <button id="start-btn">START</button>
  </div></div>
</div>

<div id="hint">CLICK THE MONITOR TO SIT DOWN</div>
<button id="back">◂ STAND UP</button>
<div id="fade"></div>

<div id="os-shell">
  <div class="bezel"></div>
  <div class="glass"></div>
  <iframe id="os-frame" title="ShauryaOS"></iframe>
</div>

<script src="../js/sound.js?v=1"></script>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07050e);
scene.fog = new THREE.Fog(0x07050e, 8, 22);

const cam = new THREE.PerspectiveCamera(38, 1, .1, 60);
const CAM_HOME = new THREE.Vector3(0, 1.55, 5.6);
const CAM_SCREEN = new THREE.Vector3(0, 1.58, 1.55);
cam.position.copy(CAM_HOME);

function size() {
  renderer.setSize(innerWidth, innerHeight, false);
  cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix();
}
size(); addEventListener('resize', size);

/* ── room, original geometry ─────────────────────────────── */
const room = new THREE.Group(); scene.add(room);
const mat = (c, r = .9, m = 0) => new THREE.MeshStandardMaterial({ color: c, roughness: r, metalness: m });

/* floor + back wall */
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), mat(0x0d0919, .95));
floor.rotation.x = -Math.PI / 2; room.add(floor);
const wall = new THREE.Mesh(new THREE.PlaneGeometry(30, 12), mat(0x0f0b1e, .98));
wall.position.set(0, 6, -3.4); room.add(wall);

/* desk */
const desk = new THREE.Group(); room.add(desk);
const top = new THREE.Mesh(new THREE.BoxGeometry(3.6, .08, 1.5), mat(0x1c1433, .7));
top.position.y = .92; desk.add(top);
[[-1.6,.46,-.55],[1.6,.46,-.55],[-1.6,.46,.55],[1.6,.46,.55]].forEach(([x,y,z]) => {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(.07, .92, .07), mat(0x140e26, .8));
  leg.position.set(x, y, z); desk.add(leg);
});

/* CRT monitor — chunky shell, recessed screen */
const crt = new THREE.Group(); crt.position.set(0, .96, -.25); room.add(crt);
const shell = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.12, 1.05), mat(0x2a2144, .55));
shell.position.y = .62; crt.add(shell);
const neck = new THREE.Mesh(new THREE.CylinderGeometry(.22, .3, .12, 24), mat(0x241b3e, .6));
neck.position.y = 0; crt.add(neck);
const foot = new THREE.Mesh(new THREE.CylinderGeometry(.42, .48, .07, 28), mat(0x241b3e, .6));
foot.position.y = -.06; crt.add(foot);

/* the screen: canvas texture running an idle terminal */
const scv = document.createElement('canvas'); scv.width = 640; scv.height = 480;
const sctx = scv.getContext('2d');
const stex = new THREE.CanvasTexture(scv);
const screen = new THREE.Mesh(new THREE.PlaneGeometry(1.18, .88),
  new THREE.MeshBasicMaterial({ map: stex }));
screen.position.set(0, .62, .535);
crt.add(screen);

/* keyboard + mug (set dressing) */
const kb = new THREE.Mesh(new THREE.BoxGeometry(1.1, .05, .38), mat(0x241b3e, .7));
kb.position.set(0, .985, .45); room.add(kb);
const mug = new THREE.Mesh(new THREE.CylinderGeometry(.07, .06, .16, 20), mat(0x7c3aed, .4));
mug.position.set(1.15, 1.04, .3); room.add(mug);

/* light: warm key, violet screen glow, soft fill so the room reads */
scene.add(new THREE.AmbientLight(0x3a2d5e, 2.6));
const glow = new THREE.PointLight(0x8b5cf6, 9, 8); glow.position.set(0, 1.6, .8); scene.add(glow);
const keyl = new THREE.PointLight(0xffd9a0, 5, 16); keyl.position.set(-3.4, 3.6, 3); scene.add(keyl);
const fill = new THREE.PointLight(0x6d5f9a, 3, 14); fill.position.set(3.2, 2.4, 2.2); scene.add(fill);
const rim = new THREE.DirectionalLight(0x8b5cf6, .7); rim.position.set(0, 4, -4); scene.add(rim);

/* dust motes */
const dustG = new THREE.BufferGeometry();
const dustN = 90, dp = new Float32Array(dustN * 3);
for (let i = 0; i < dustN; i++) { dp[i*3] = (Math.random()-.5)*8; dp[i*3+1] = Math.random()*3.4; dp[i*3+2] = (Math.random()-.5)*6; }
dustG.setAttribute('position', new THREE.BufferAttribute(dp, 3));
const dust = new THREE.Points(dustG, new THREE.PointsMaterial({ color: 0x9f8fd0, size: .012, transparent: true, opacity: .5 }));
scene.add(dust);

/* ── idle screen drawing ─────────────────────────────────── */
/* CONTENT SLOT: idle screen lines */
const IDLE = [
  'SHAURYA-OS v2 — RESEARCH TERMINAL',
  '',
  '  1 PAPER ACCEPTED ......... ADCAIJ 2026',
  '  12 IN MOTION ............. HONEST LABELS',
  '  FAILURE LOG .............. PUBLIC',
  '',
  '  CLICK TO SIT DOWN_',
];
function drawScreen(t) {
  sctx.fillStyle = '#0d0721'; sctx.fillRect(0, 0, 640, 480);
  sctx.fillStyle = '#b9a6f5'; sctx.font = '600 22px "IBM Plex Mono", monospace';
  IDLE.forEach((ln, i) => {
    let s = ln;
    if (i === IDLE.length - 1) s = (Math.floor(t / 500) % 2) ? ln : ln.replace('_', ' ');
    sctx.fillText(s, 40, 90 + i * 44);
  });
  const y = (t / 14) % 560 - 40;
  const g = sctx.createLinearGradient(0, y - 30, 0, y + 30);
  g.addColorStop(0, 'rgba(255,255,255,0)'); g.addColorStop(.5, 'rgba(185,166,245,.08)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  sctx.fillStyle = g; sctx.fillRect(0, y - 30, 640, 60);
  sctx.fillStyle = 'rgba(0,0,0,.16)';
  for (let yy = 0; yy < 480; yy += 4) sctx.fillRect(0, yy, 640, 1);
  stex.needsUpdate = true;
}

/* ── state machine: gate → room → zoom → os ──────────────── */
let mode = 'gate';
let zoomT = 0;
const mouse = { x: 0, y: 0 };
addEventListener('mousemove', e => { mouse.x = e.clientX / innerWidth - .5; mouse.y = e.clientY / innerHeight - .5; });

document.getElementById('start-btn').addEventListener('click', () => {
  SND.boot();
  document.getElementById('gate').style.display = 'none';
  document.getElementById('hint').classList.add('show');
  mode = 'room';
});

const ray = new THREE.Raycaster();
canvas.addEventListener('click', e => {
  if (mode !== 'room') return;
  ray.setFromCamera(new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1), cam);
  if (ray.intersectObjects([screen, shell]).length) {
    mode = 'zooming'; zoomT = 0; SND.open();
    document.getElementById('hint').classList.remove('show');
  }
});
function enterOS() {
  const f = document.getElementById('fade');
  f.style.opacity = '1';
  setTimeout(() => {
    document.getElementById('os-frame').src = '../research-v2/';
    document.getElementById('os-shell').classList.add('on');
    document.getElementById('back').style.display = 'block';
    f.style.opacity = '0'; mode = 'os';
  }, 460);
}
document.getElementById('back').addEventListener('click', () => {
  SND.click();
  const f = document.getElementById('fade');
  f.style.opacity = '1';
  setTimeout(() => {
    document.getElementById('os-shell').classList.remove('on');
    document.getElementById('os-frame').src = '';
    document.getElementById('back').style.display = 'none';
    document.getElementById('hint').classList.add('show');
    mode = 'unzooming'; zoomT = 0;
    f.style.opacity = '0';
  }, 460);
});

const look = new THREE.Vector3(0, 1.45, -.2);
function tick(t) {
  drawScreen(t);
  dust.rotation.y = t / 60000;
  glow.intensity = 5.2 + Math.sin(t / 320) * .5;

  if (mode === 'gate' || mode === 'room') {
    const sway = Math.sin(t / 3600) * .12;
    cam.position.x = CAM_HOME.x + sway + mouse.x * .3;
    cam.position.y = CAM_HOME.y - mouse.y * .18;
    cam.position.z = CAM_HOME.z;
    cam.lookAt(look);
  } else if (mode === 'zooming') {
    zoomT = Math.min(1, zoomT + .011);
    const e = 1 - Math.pow(1 - zoomT, 3);
    cam.position.lerpVectors(CAM_HOME, CAM_SCREEN, e);
    cam.lookAt(0, 1.58, -.25);
    if (zoomT >= 1) { mode = 'os-wait'; enterOS(); }
  } else if (mode === 'unzooming') {
    zoomT = Math.min(1, zoomT + .013);
    const e = 1 - Math.pow(1 - zoomT, 3);
    cam.position.lerpVectors(CAM_SCREEN, CAM_HOME, e);
    cam.lookAt(look);
    if (zoomT >= 1) mode = 'room';
  }
  renderer.render(scene, cam);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
SND.attach();
</script>
</body>
</html>
