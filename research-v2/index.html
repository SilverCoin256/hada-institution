<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShauryaOS — Research Terminal</title>
<meta name="description" content="The research program, presented as a retro operating system. Same real content, different machine.">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* RESEARCH V2 — "SHAURYAOS". Design locked; later models edit CONTENT SLOTS only. */
:root { --desk: #241a4e; --win: #ece9f6; --title: #7c3aed; --title2: #4c1d95; --ink: #16121f; --lite: #fff; --shadow: #0e0a1c; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; font-family: 'IBM Plex Mono', monospace; overflow: hidden; height: 100vh; }

/* CRT */
#crt { position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.07) 0 1px, transparent 1px 4px); }
#crt::after { content:''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 58%, rgba(0,0,0,.5) 100%); }

/* BOOT */
#boot { position: fixed; inset: 0; background: #000; color: #b9a6f5; z-index: 500;
  padding: 48px; font-size: 16px; line-height: 1.9; white-space: pre-wrap; }
#boot .ok { color: #7ef29a; }
#boot .skip { position: absolute; bottom: 24px; right: 30px; color: #5a4a8a; background: none; border: 1px solid #5a4a8a; padding: 6px 12px; font-family: inherit; cursor: pointer; }

/* DESKTOP */
#desktop { position: fixed; inset: 0 0 44px 0; background: url('../assets/os-wallpaper.png') center/cover, var(--desk); display: none; }
.icon { position: absolute; width: 104px; text-align: center; cursor: pointer; color: #fff; }
.icon .glyph { width: 60px; height: 50px; margin: 0 auto 6px; border: 2px solid #fff; background: rgba(124,58,237,.35);
  display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 3px 3px 0 var(--shadow); }
.icon .lbl { font-size: 12px; text-shadow: 1px 1px 0 #000; line-height: 1.3; }
.icon:hover .glyph { background: rgba(124,58,237,.7); }

/* WINDOWS */
.win { position: absolute; min-width: 380px; max-width: min(720px, 94vw); background: var(--win); border: 2px solid var(--ink);
  box-shadow: 6px 6px 0 rgba(14,10,28,.55); display: none; }
.win.open { display: block; }
.win .bar { background: linear-gradient(90deg, var(--title2), var(--title)); color: #fff; padding: 9px 14px;
  display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; font-size: 14px; font-weight: 600; letter-spacing: .04em; }
.win .bar .x { width: 20px; height: 20px; border: 1.5px solid #fff; background: transparent; color: #fff;
  font-family: inherit; font-size: 11px; cursor: pointer; line-height: 1; }
.win .body { padding: 26px 30px; font-size: 15px; line-height: 1.95; color: var(--ink); max-height: min(58vh, 540px); overflow: auto; }
.win .body h1 { font-size: 17px; margin-bottom: 16px; letter-spacing: .02em; color: var(--title2); }
.win .body .row { border-top: 1px dashed #b6aed2; padding: 15px 0; }
.win .body .st { display: inline-block; font-size: 11px; padding: 2px 9px; border: 1px solid var(--ink); margin-right: 8px; background: #fff; }
.win .body .st.acc { background: #7ef29a; }
.win .body .st.warn { background: #ffd37e; }
.win .body a { color: var(--title); }
.win .body .dt { color: #5d5085; font-size: 13px; }

/* TASKBAR */
#bar { position: fixed; left: 0; right: 0; bottom: 0; height: 52px; background: var(--win); border-top: 2px solid var(--ink);
  display: none; align-items: center; gap: 8px; padding: 0 8px; z-index: 400; }
#bar .start { background: var(--title); color: #fff; border: 2px solid var(--ink); padding: 6px 14px; font-family: inherit;
  font-weight: 600; font-size: 13px; cursor: pointer; box-shadow: 2px 2px 0 var(--shadow); }
#bar .task { border: 1.5px solid var(--ink); background: #fff; padding: 7px 12px; font-family: inherit; font-size: 12px; cursor: pointer; }
#bar .task.active { background: #d9ccf7; }
#bar .clock { margin-left: auto; font-size: 12px; padding: 0 10px; border-left: 2px solid var(--ink); }
#snd-led { font-size: 10px; padding: 4px 8px; border: 1.5px solid var(--ink); background: #fff; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div id="crt"></div>
<div id="boot"></div>

<div id="desktop"></div>

<div id="bar">
  <button class="start" id="start">◈ SHAURYA</button>
  <div id="tasks" style="display:flex;gap:6px;"></div>
  <button id="snd-led">SND ON</button>
  <span class="clock" id="clock"></span>
</div>

<script src="../js/sound.js?v=1"></script>
<script>
/* ============ CONTENT SLOT: window contents (edit text/links only) ============ */
const WINDOWS = {
  readme: { title: 'README.TXT', x: 190, y: 70, html: `
    <h1>SHAURYA GUPTA — RESEARCH TERMINAL v2</h1>
    <p>This machine presents the same research program as the
    <a href="https://silvercoin256.github.io/hada-institution/" target="_blank" rel="noopener">modern site</a> —
    identical real content, older machine. Nothing here is claimed that isn't claimed there.</p>
    <p style="margin-top:8px;">Double-truths of this program: one accepted paper (ADCAIJ 2026);
    everything else is a working paper, under review, in data collection, or openly retired.
    The failure log is a feature, not a confession.</p>
    <p style="margin-top:8px;" class="dt">SND toggles at the taskbar. Windows drag by their title bars.</p>` },
  papers: { title: 'PAPERS.DIR', x: 260, y: 110, html: `
    <h1>C:\\RESEARCH\\PAPERS — 13 FILES</h1>
    <div class="row"><span class="st acc">ACCEPTED</span><b>Capacity Degradation in Distributed Human-in-the-Loop AI Pipelines</b><br><span class="dt">ADCAIJ Vol. 15 (2026) — SEDI metric; 22 months of real GitHub telemetry; latency 91h→8.5h under a 33× load surge.</span></div>
    <div class="row"><span class="st">WORKING</span><b>Modeling Authorization Saturation</b><br><span class="dt">SBP-BRiMS 2026 — coupled two-queue model of ceremonial sign-off.</span></div>
    <div class="row"><span class="st">UNDER REV.</span><b>Bounded Coordination</b> <span class="dt">— AI &amp; Society</span></div>
    <div class="row"><span class="st">WORKING</span><b>Comment Letters Are Not Reviews</b><br><span class="dt">Proxy reversed sign against the SEC's own denominator (+186% vs −20%).</span></div>
    <div class="row"><span class="st warn">DATA COLL.</span><b>Human-AI Anchoring Asymmetry</b><br><span class="dt">18,000-call battery done; cross-model replication FAILED; human study awaiting IRB.</span></div>
    <div class="row"><span class="dt">+ 8 more files — open the <a href="https://silvercoin256.github.io/hada-institution/research.html" target="_blank" rel="noopener">full archive in Modern Browser →</a></span></div>` },
  notebook: { title: 'NOTEBOOK.LOG', x: 330, y: 150, html: `
    <h1>TAIL -N 5 NOTEBOOK.LOG</h1>
    <div class="row"><span class="dt">2026-07-01</span> <span class="st acc">FINDING</span> Rebuilt the pipeline end to end — CV AUC 0.810 ± 0.019; headline finding changed. Slower pipeline, correct numbers.</div>
    <div class="row"><span class="dt">2026-06-30</span> <span class="st warn">FAILURE</span> Major revision — reviewer was right; figures had been drawn from illustrative constants.</div>
    <div class="row"><span class="dt">2026-06-26</span> <span class="st">OBS</span> Observatory v1.0.0-rc1 released; SSA + Meta sources CUT after retrieval audit.</div>
    <div class="row"><span class="dt">2026-06-25</span> <span class="st acc">FINDING</span> First real-world SEDI signal (langchain, 33× surge).</div>
    <div class="row"><span class="dt">2026-06-18</span> <span class="st warn">FAILURE</span> Cross-model replication: total loss.</div>
    <div class="row"><span class="dt">FULL LOG: <a href="https://silvercoin256.github.io/hada-institution/notebook.html" target="_blank" rel="noopener">notebook.html →</a></span></div>` },
  failures: { title: 'FAILURES.SYS', x: 400, y: 90, html: `
    <h1>SYSTEM FAULT RECORD — KEPT ON PURPOSE</h1>
    <div class="row"><span class="dt">2026-06-15</span> Regulatory-debt thesis died on contact with real SEC data. Pivoted to a methods paper.</div>
    <div class="row"><span class="dt">2026-06-18</span> Oversight metric's validation was circular; rebuilt on non-circular data before submission.</div>
    <div class="row"><span class="dt">2026-06-18</span> Cross-model replication: total loss, reported as such.</div>
    <div class="row"><span class="dt">2026-05-18</span> Early draft overclaimed a corpus that didn't exist yet. Caught in self-audit.</div>
    <div class="row"><span class="dt">"A falsified hypothesis is a result." — <a href="https://silvercoin256.github.io/hada-institution/research.html#failures" target="_blank" rel="noopener">full record →</a></span></div>` },
  atlas: { title: 'ATLAS.EXE', x: 230, y: 190, html: `
    <h1>OPEN INSTITUTIONAL CAPACITY OBSERVATORY</h1>
    <p>Five instruments over public data — QAI · SEDI · AUTH-SAT · PROC-CAP · ASI.<br>
    <span class="dt">MIT / CC BY 4.0 · v1.0.0-rc1 · pilot tables: EOIR, USCIS, CFPB, SEC.</span></p>
    <p style="margin-top:8px;"><a href="https://silvercoin256.github.io/hada-institution/atlas.html" target="_blank" rel="noopener">RUN IN MODERN BROWSER →</a></p>` },
  browser: { title: 'MODERN BROWSER', x: 240, y: 90, html: `
    <h1>THIS MACHINE IS THE OLD BUILDING</h1>
    <p>The maintained research site — figures drawn from real data, the full archive, the atlas, the notebook — lives here:</p>
    <p style="margin-top:10px;"><a href="https://silvercoin256.github.io/hada-institution/" target="_blank" rel="noopener">https://silvercoin256.github.io/hada-institution/ →</a></p>` },
};
const ICONS = [
  { id: 'readme',   g: '≡', l: 'README.TXT',   x: 26,  y: 30 },
  { id: 'papers',   g: '▤', l: 'PAPERS.DIR',   x: 26,  y: 150 },
  { id: 'notebook', g: '✎', l: 'NOTEBOOK.LOG', x: 26,  y: 274 },
  { id: 'failures', g: '▲', l: 'FAILURES.SYS', x: 26,  y: 398 },
  { id: 'atlas',    g: '◔', l: 'ATLAS.EXE',    x: 26,  y: 522 },
  { id: 'browser',  g: '⇗', l: 'MODERN BROWSER', x: 138, y: 30 },
];
const BOOT_LINES = [
  ['SHAURYA BIOS v5.0 — INSTITUTIONAL RESEARCH MACHINE', 60],
  ['MEM CHECK: 640K FINDINGS ........ <span class="ok">OK</span>', 350],
  ['MOUNTING /PAPERS (13 FILES) ..... <span class="ok">OK</span>', 300],
  ['MOUNTING /FAILURES (7 FILES) .... <span class="ok">OK — KEPT ON PURPOSE</span>', 380],
  ['LOADING OVERSIGHT DRIVERS ....... <span class="ok">OK</span>', 300],
  ['PEER REVIEW STATUS .............. <span class="ok">1 ACCEPTED (ADCAIJ 2026)</span>', 380],
  ['STARTING SHAURYA-OS ............. <span class="ok">WELCOME</span>', 420],
];
/* ======================= END CONTENT SLOT ======================= */

const boot = document.getElementById('boot');
let zTop = 10, bootDone = false;
function runBoot() {
  let t = 400;
  BOOT_LINES.forEach(([ln, d], i) => {
    t += d;
    setTimeout(() => { if (bootDone) return; boot.innerHTML += ln + '\n'; SND.key(); }, t);
  });
  setTimeout(finishBoot, t + 700);
  const s = document.createElement('button');
  s.className = 'skip'; s.textContent = 'SKIP BOOT ▸';
  s.onclick = finishBoot; boot.appendChild(s);
}
function finishBoot() {
  if (bootDone) return; bootDone = true;
  SND.boot();
  boot.style.display = 'none';
  document.getElementById('desktop').style.display = 'block';
  document.getElementById('bar').style.display = 'flex';
  openWin('readme');
}

/* desktop build */
const desk = document.getElementById('desktop');
ICONS.forEach(ic => {
  const el = document.createElement('div');
  el.className = 'icon'; el.style.left = ic.x + 'px'; el.style.top = ic.y + 'px';
  el.innerHTML = `<div class="glyph">${ic.g}</div><div class="lbl">${ic.l}</div>`;
  el.addEventListener('dblclick', () => openWin(ic.id));
  el.addEventListener('click', () => openWin(ic.id)); /* single-click friendly */
  desk.appendChild(el);
});
Object.entries(WINDOWS).forEach(([id, w]) => {
  const el = document.createElement('div');
  el.className = 'win'; el.id = 'w-' + id;
  el.style.left = w.x + 'px'; el.style.top = w.y + 'px';
  el.innerHTML = `<div class="bar"><span>${w.title}</span><button class="x">✕</button></div><div class="body">${w.html}</div>`;
  desk.appendChild(el);
  el.querySelector('.x').addEventListener('click', e => { e.stopPropagation(); closeWin(id); });
  el.addEventListener('mousedown', () => { el.style.zIndex = ++zTop; });
  /* drag */
  const bar = el.querySelector('.bar');
  let dx, dy, drag = false;
  const move = e => { if (!drag) return; el.style.left = (e.clientX - dx) + 'px'; el.style.top = Math.max(0, e.clientY - dy) + 'px'; };
  bar.addEventListener('mousedown', e => { drag = true; dx = e.clientX - el.offsetLeft; dy = e.clientY - el.offsetTop; el.style.zIndex = ++zTop; });
  addEventListener('mousemove', move);
  addEventListener('mouseup', () => drag = false);
});

const tasks = document.getElementById('tasks');
function openWin(id) {
  const el = document.getElementById('w-' + id);
  if (!el.classList.contains('open')) {
    el.classList.add('open'); el.style.zIndex = ++zTop; SND.open();
    const tb = document.createElement('button');
    tb.className = 'task active'; tb.id = 't-' + id; tb.textContent = WINDOWS[id].title;
    tb.onclick = () => { el.style.zIndex = ++zTop; SND.click(); };
    tasks.appendChild(tb);
  } else { el.style.zIndex = ++zTop; SND.click(); }
}
function closeWin(id) {
  document.getElementById('w-' + id).classList.remove('open');
  const tb = document.getElementById('t-' + id); if (tb) tb.remove();
  SND.error();
}

/* clock + sound LED */
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}, 1000);
const led = document.getElementById('snd-led');
led.textContent = SND.on ? 'SND ON' : 'SND OFF';
led.onclick = () => led.textContent = SND.toggle() ? 'SND ON' : 'SND OFF';
document.getElementById('start').onclick = () => { openWin('readme'); };

runBoot();
</script>
</body>
</html>
